name: Controllo sintassi Python

on: [push]

jobs:
  controlla-sintassi:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verifica sintassi di tutti i file Python
        run: |
          python -m py_compile *.py
          echo "✅ Tutti i file Python sono sintatticamente corretti!"
